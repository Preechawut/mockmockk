services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: mockapi
      POSTGRES_PASSWORD: mockapi
      POSTGRES_DB: mockapi
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mockapi"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build:
      context: ..
      dockerfile: deployments/Dockerfile
    environment:
      PORT: 8080
      DB_URL: postgres://mockapi:mockapi@postgres:5432/mockapi?sslmode=disable
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
