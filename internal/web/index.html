<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>mockapi</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --background: 0 0% 100%;
    --foreground: 240 10% 3.9%;
    --card: 0 0% 100%;
    --muted: 240 4.8% 95.9%;
    --muted-foreground: 240 3.8% 46.1%;
    --border: 240 5.9% 90%;
    --input: 240 5.9% 90%;
    --primary: 240 5.9% 10%;
    --primary-foreground: 0 0% 98%;
    --ring: 240 5% 65%;
    --destructive: 0 72% 51%;
    --radius: 0.5rem;

    --green: 142 71% 45%;
    --blue: 217 91% 60%;
    --amber: 38 92% 50%;
    --red: 0 72% 51%;
    --purple: 271 81% 56%;

    --font: "Inter", system-ui, -apple-system, sans-serif;
    --mono: "JetBrains Mono", ui-monospace, monospace;
  }

  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    background: hsl(var(--background));
    color: hsl(var(--foreground));
    font-family: var(--font);
    font-size: 14px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  button { font-family: inherit; cursor: pointer; }
  input, select, textarea { font-family: inherit; }
  :focus-visible { outline: 2px solid hsl(var(--ring)); outline-offset: 2px; }

  /* header */
  header {
    display: flex; align-items: center; justify-content: space-between;
    height: 56px; padding: 0 24px;
    border-bottom: 1px solid hsl(var(--border));
  }
  .logo { font-weight: 600; font-size: 15px; letter-spacing: -0.01em; }
  .logo span { color: hsl(var(--muted-foreground)); font-weight: 400; }
  .status {
    display: inline-flex; align-items: center; gap: 7px;
    font-size: 12px; color: hsl(var(--muted-foreground));
    border: 1px solid hsl(var(--border)); border-radius: 999px;
    padding: 4px 11px;
  }
  .status .dot { width: 6px; height: 6px; border-radius: 50%; background: hsl(var(--muted-foreground)); }
  .status.ok .dot { background: hsl(var(--green)); }
  .status.bad .dot { background: hsl(var(--red)); }

  /* layout */
  .wrap { max-width: 1100px; margin: 0 auto; padding: 28px 24px; }
  .grid { display: grid; grid-template-columns: 340px 1fr; gap: 20px; align-items: start; }
  @media (max-width: 820px) { .grid { grid-template-columns: 1fr; } }

  /* card */
  .card {
    background: hsl(var(--card));
    border: 1px solid hsl(var(--border));
    border-radius: var(--radius);
  }
  .card-h {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 18px 0;
  }
  .card-h h2 { font-size: 15px; font-weight: 600; margin: 0; }
  .card-h p { font-size: 13px; color: hsl(var(--muted-foreground)); margin: 2px 0 0; }
  .card-c { padding: 16px 18px; }

  /* buttons */
  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 6px;
    height: 36px; padding: 0 14px; border-radius: calc(var(--radius) - 2px);
    font-size: 13.5px; font-weight: 500; border: 1px solid transparent;
    transition: background .12s, border-color .12s, opacity .12s;
    white-space: nowrap;
  }
  .btn-primary { background: hsl(var(--primary)); color: hsl(var(--primary-foreground)); }
  .btn-primary:hover { opacity: .9; }
  .btn-outline { background: transparent; border-color: hsl(var(--border)); color: hsl(var(--foreground)); }
  .btn-outline:hover { background: hsl(var(--muted)); }
  .btn-ghost { background: transparent; color: hsl(var(--foreground)); }
  .btn-ghost:hover { background: hsl(var(--muted)); }
  .btn-destructive { background: transparent; color: hsl(var(--destructive)); border-color: transparent; }
  .btn-destructive:hover { background: hsl(var(--destructive) / 0.08); }
  .btn-sm { height: 32px; padding: 0 11px; font-size: 13px; }
  .btn:disabled { opacity: .5; cursor: not-allowed; }

  /* inputs */
  label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 6px; }
  .input, .select, .textarea {
    width: 100%; height: 36px; padding: 0 11px;
    border: 1px solid hsl(var(--input)); border-radius: calc(var(--radius) - 2px);
    background: transparent; color: hsl(var(--foreground)); font-size: 13.5px;
  }
  .input::placeholder { color: hsl(var(--muted-foreground)); }
  .input:focus, .select:focus, .textarea:focus { outline: 2px solid hsl(var(--ring)); outline-offset: -1px; border-color: transparent; }
  .textarea {
    height: auto; min-height: 180px; padding: 11px; resize: vertical;
    font-family: var(--mono); font-size: 13px; line-height: 1.6;
  }
  .field { margin-bottom: 14px; }
  .row { display: flex; gap: 10px; }
  .row .grow { flex: 1; }

  /* method badge */
  .m {
    font-family: var(--mono); font-size: 11px; font-weight: 500;
    padding: 2px 7px; border-radius: 5px; letter-spacing: .02em;
  }
  .m-GET { color: hsl(var(--green)); background: hsl(var(--green) / 0.12); }
  .m-POST { color: hsl(var(--blue)); background: hsl(var(--blue) / 0.12); }
  .m-PUT { color: hsl(var(--amber)); background: hsl(var(--amber) / 0.14); }
  .m-DELETE { color: hsl(var(--red)); background: hsl(var(--red) / 0.12); }
  .m-PATCH { color: hsl(var(--purple)); background: hsl(var(--purple) / 0.12); }

  /* mockmock list */
  .mockmock {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 12px; border-radius: calc(var(--radius) - 2px);
    border: 1px solid transparent; width: 100%; text-align: left;
    background: transparent; color: inherit; transition: background .1s, border-color .1s;
  }
  .mockmock:hover { background: hsl(var(--muted)); }
  .mockmock.active { background: hsl(var(--muted)); border-color: hsl(var(--border)); }
  .mockmock .path { font-family: var(--mono); font-size: 13px; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .mockmock .st { font-family: var(--mono); font-size: 11px; color: hsl(var(--muted-foreground)); }

  .list-empty { color: hsl(var(--muted-foreground)); font-size: 13px; text-align: center; padding: 26px 0; }

  .sep { height: 1px; background: hsl(var(--border)); margin: 14px 0; }

  /* try-it response */
  .resp { margin-top: 16px; }
  .resp-bar { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .code {
    font-family: var(--mono); font-size: 12px; font-weight: 500;
    padding: 2px 8px; border-radius: 5px;
  }
  .code.ok { color: hsl(var(--green)); background: hsl(var(--green) / 0.12); }
  .code.err { color: hsl(var(--red)); background: hsl(var(--red) / 0.12); }
  pre.json {
    margin: 0; padding: 13px; border-radius: calc(var(--radius) - 2px);
    background: hsl(var(--muted)); border: 1px solid hsl(var(--border));
    font-family: var(--mono); font-size: 12.5px; line-height: 1.6;
    overflow: auto; max-height: 280px; white-space: pre;
  }
  .tok-key { color: hsl(var(--purple)); }
  .tok-str { color: hsl(var(--green)); }
  .tok-num { color: hsl(var(--blue)); }
  .tok-bool { color: hsl(var(--amber)); }

  .hint { font-size: 12px; color: hsl(var(--muted-foreground)); margin-top: 7px; font-family: var(--mono); }
  .hint code { color: hsl(var(--foreground)); }

  /* toast */
  .toast {
    position: fixed; bottom: 22px; left: 50%;
    transform: translateX(-50%) translateY(12px);
    background: hsl(var(--primary)); color: hsl(var(--primary-foreground));
    padding: 10px 16px; border-radius: var(--radius); font-size: 13px;
    opacity: 0; pointer-events: none; transition: opacity .18s, transform .18s; z-index: 60;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast.bad { background: hsl(var(--destructive)); }
</style>
</head>
<body>
  <header>
    <div class="logo">mockapi <span>/ mockmock server</span></div>
    <div class="status" id="status"><span class="dot"></span><span id="statusText">connecting…</span></div>
  </header>

  <div class="wrap">
    <div class="grid">
      <!-- list -->
      <div class="card">
        <div class="card-h">
          <div><h2>Endpoints</h2><p id="mockmockCount">0 mockmocks</p></div>
          <button class="btn btn-primary btn-sm" id="newBtn">New</button>
        </div>
        <div class="card-c" id="mockmockList"></div>
      </div>

      <!-- editor -->
      <div class="card">
        <div class="card-h"><div><h2 id="editorTitle">New endpoint</h2><p>Define a request and the exact response it returns.</p></div></div>
        <div class="card-c" id="editor"></div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const METHODS = ["GET", "POST", "PUT", "PATCH", "DELETE"];
    let mockmocks = [];
    let current = null; // selected mockmock or null (new)

    // ---------- api ----------
    async function api(method, path, body) {
      const opt = { method, headers: { "Content-Type": "application/json" } };
      if (body !== undefined) opt.body = JSON.stringify(body);
      const res = await fetch(path, opt);
      const json = await res.json().catch(() => ({}));
      if (json && json.error) throw new Error(json.error.message || json.error.code);
      if (!res.ok) throw new Error("HTTP " + res.status);
      return json.data !== undefined ? json.data : json;
    }

    // ---------- helpers ----------
    function esc(s) {
      return String(s).replace(/[&<>"]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));
    }
    function el(html) {
      const t = document.createElement("template");
      t.innerHTML = html.trim();
      return t.content.firstElementChild;
    }
    function highlight(obj) {
      let json;
      try { json = JSON.stringify(obj, null, 2); } catch { json = String(obj); }
      if (json === undefined) json = "null";
      return json.replace(/("(\\.|[^"\\])*"\s*:)|("(\\.|[^"\\])*")|(\b(true|false|null)\b)|(-?\d+\.?\d*)/g,
        (m, key, _k, str, _s, bool) => {
          if (key) return '<span class="tok-key">' + esc(key) + '</span>';
          if (str) return '<span class="tok-str">' + esc(str) + '</span>';
          if (bool) return '<span class="tok-bool">' + esc(m) + '</span>';
          return '<span class="tok-num">' + m + '</span>';
        });
    }
    let toastTimer;
    function toast(msg, bad) {
      const t = document.getElementById("toast");
      t.textContent = msg;
      t.className = "toast show" + (bad ? " bad" : "");
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => (t.className = "toast" + (bad ? " bad" : "")), 2200);
    }

    // ---------- load ----------
    async function load(keepId) {
      try {
        mockmocks = (await api("GET", "/api/v1/mockmocks")) || [];
        setStatus(true);
      } catch (e) {
        setStatus(false);
        return;
      }
      renderList();
      const keep = mockmocks.find(s => s.id === keepId);
      if (keep) select(keep);
      else if (!current) renderEditor(null);
    }
    function setStatus(ok) {
      const s = document.getElementById("status");
      s.className = "status " + (ok ? "ok" : "bad");
      document.getElementById("statusText").textContent = ok ? "connected" : "no server";
    }

    // ---------- list ----------
    function renderList() {
      document.getElementById("mockmockCount").textContent = mockmocks.length + (mockmocks.length === 1 ? " mockmock" : " mockmocks");
      const list = document.getElementById("mockmockList");
      list.innerHTML = "";
      if (mockmocks.length === 0) {
        list.appendChild(el(`<div class="list-empty">No mockmocks yet.<br>Create one to start mocking.</div>`));
        return;
      }
      mockmocks.forEach(s => {
        const item = el(`<button class="mockmock ${current && current.id === s.id ? "active" : ""}">
          <span class="m m-${esc(s.method)}">${esc(s.method)}</span>
          <span class="path">${esc(s.path)}</span>
          <span class="st">${s.status}</span>
        </button>`);
        item.onclick = () => select(s);
        list.appendChild(item);
      });
    }

    function select(s) {
      current = s;
      renderList();
      renderEditor(s);
    }

    // ---------- editor ----------
    function renderEditor(s) {
      document.getElementById("editorTitle").textContent = s ? "Edit endpoint" : "New endpoint";
      const ed = document.getElementById("editor");
      const respStr = s ? JSON.stringify(s.response, null, 2) : '{\n  "message": "hello"\n}';
      ed.innerHTML = "";

      const form = el(`<div>
        <div class="row">
          <div class="field" style="width:130px">
            <label>Method</label>
            <select class="select" id="eMethod">${METHODS.map(m => `<option ${s && s.method === m ? "selected" : ""}>${m}</option>`).join("")}</select>
          </div>
          <div class="field grow">
            <label>Path</label>
            <input class="input" id="ePath" placeholder="/weather" value="${s ? esc(s.path) : ""}" />
          </div>
          <div class="field" style="width:96px">
            <label>Status</label>
            <input class="input" id="eStatus" type="number" value="${s ? s.status : 200}" />
          </div>
        </div>
        <div class="field">
          <label>Response body (JSON)</label>
          <textarea class="textarea" id="eResp" spellcheck="false">${esc(respStr)}</textarea>
        </div>
        <div class="row">
          <button class="btn btn-primary" id="saveBtn">${s ? "Save changes" : "Create endpoint"}</button>
          <button class="btn btn-outline" id="sendBtn">Send request</button>
          ${s ? '<button class="btn btn-outline" id="dupBtn">Duplicate</button>' : ""}
          <div style="flex:1"></div>
          ${s ? '<button class="btn btn-destructive" id="delBtn">Delete</button>' : ""}
        </div>
        <p class="hint">Served at <code id="urlPreview"></code></p>
        <div class="resp" id="respArea"></div>
      </div>`);
      ed.appendChild(form);

      const methodSel = form.querySelector("#eMethod");
      const pathInp = form.querySelector("#ePath");
      const statusInp = form.querySelector("#eStatus");
      const respInp = form.querySelector("#eResp");
      const urlPrev = form.querySelector("#urlPreview");

      const updateUrl = () => {
        const p = pathInp.value.trim() || "/…";
        urlPrev.textContent = `${methodSel.value} ${location.origin}/mock${p.startsWith("/") ? p : "/" + p}`;
      };
      updateUrl();
      methodSel.onchange = updateUrl;
      pathInp.oninput = updateUrl;

      form.querySelector("#saveBtn").onclick = async () => {
        const path = pathInp.value.trim();
        if (!path) { toast("Path is required", true); return; }
        let response;
        try { response = respInp.value.trim() ? JSON.parse(respInp.value) : null; }
        catch { toast("Response is not valid JSON", true); return; }
        const payload = {
          method: methodSel.value,
          path,
          status: parseInt(statusInp.value, 10) || 200,
          response,
        };
        try {
          if (s) {
            const updated = await api("PUT", "/api/v1/mockmocks/" + s.id, payload);
            toast("Saved");
            await load(updated.id);
          } else {
            const created = await api("POST", "/api/v1/mockmocks", payload);
            toast("Endpoint created");
            await load(created.id);
          }
        } catch (e) { toast(e.message, true); }
      };

      form.querySelector("#sendBtn").onclick = async () => {
        const path = pathInp.value.trim();
        if (!path) { toast("Set a path first", true); return; }
        const url = "/mock" + (path.startsWith("/") ? path : "/" + path);
        const area = form.querySelector("#respArea");
        try {
          const res = await fetch(url, { method: methodSel.value });
          const text = await res.text();
          let parsed; try { parsed = JSON.parse(text); } catch { parsed = text; }
          area.innerHTML = `
            <div class="resp-bar">
              <span class="code ${res.ok ? "ok" : "err"}">${res.status}</span>
              <span class="hint" style="margin:0">${methodSel.value} ${esc(url)}</span>
            </div>
            <pre class="json">${highlight(parsed)}</pre>`;
        } catch (e) {
          area.innerHTML = `<div class="resp-bar"><span class="code err">ERR</span></div><pre class="json">${esc(e.message)}</pre>`;
        }
      };

      const dup = form.querySelector("#dupBtn");
      if (dup) dup.onclick = async () => {
        try {
          const copy = await api("POST", "/api/v1/mockmocks/" + s.id + "/duplicate");
          toast("Duplicated → " + copy.path);
          await load(copy.id);
        } catch (e) { toast(e.message, true); }
      };

      const del = form.querySelector("#delBtn");
      if (del) del.onclick = async () => {
        if (!confirm(`Delete ${s.method} ${s.path}?`)) return;
        try {
          await api("DELETE", "/api/v1/mockmocks/" + s.id);
          toast("Deleted");
          current = null;
          await load();
          renderEditor(null);
        } catch (e) { toast(e.message, true); }
      };
    }

    document.getElementById("newBtn").onclick = () => { current = null; renderList(); renderEditor(null); };

    load();
  </script>
</body>
</html>
